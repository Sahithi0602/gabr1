name  :  NodeJs
on  :  push
jobs  : 
  build  : 
    runs-on  :  self-hosted
    steps  : 
      - name  :  get code
        uses  :  actions/checkout@v6
      - name  :  Set up nodejs
        uses  :  actions/setup-node@v6
        with  : 
          node-version  :  18
      - name  :  Install dependencies
        run  :  npm install
      - name  :  Run tests
        run  :  npm test
      - name  :  Build
        run  :  npm run build
      - name  :  Deploy
        run  :  echo "Deploying to production server..."

      - name: Artifact upload
        uses: actions/upload-artifact@v4
        with:
          name: artifact-1
          path:
             package*
