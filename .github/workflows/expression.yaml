name: NodeJs-trigger
on:
  push:
    branches:
      - master
  workflow_dispatch: 
jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: get code
        uses: actions/checkout@v4
      - name: Set up nodejs
        uses: actions/setup-node@v4
        with:
          node-version: 18
      - name: Install dependencies
        run: npm install
      - name: Run tests
        run: npm test
      - name: Build
        run: npm run build
      - name: Deploy
        run: echo "Deploying to production server..."
  info:
     runs-on: ubuntu-latest
     steps:
       - name: Output of the Job
         run: echo "${{ toJson(github) }}" 





      
